<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forml WASM Compiler Test Bench</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        h2 {
            margin-top: 0;
        }
        textarea {
            width: 100%;
            height: 150px;
            font-family: monospace;
            padding: 10px;
            box-sizing: border-box;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .panel {
            flex: 1;
            background: #fff;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            min-height: 200px;
            overflow-x: auto;
        }
        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .error { color: #d9534f; font-weight: bold; }
        .warning { color: #f0ad4e; font-weight: bold; }
        .info { color: #5bc0de; }
        .success { color: #5cb85c; font-weight: bold; }
        #status {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h2>Forml WASM Compiler Test Bench</h2>
    <div id="status">Loading WebAssembly...</div>

    <textarea id="source" placeholder="Enter Forml source code here...">form MyForm {
  page FirstPage {
    field username: Text {
      label: "Username"
    }
  }
}</textarea>
    <br>
    <button id="compileBtn" disabled>Compile</button>

    <div class="container">
        <div class="panel">
            <h3>Diagnostics</h3>
            <pre id="diagnostics-output">No diagnostics yet.</pre>
        </div>
        <div class="panel">
            <h3>Serialized AST</h3>
            <pre id="ast-output">No AST generated yet.</pre>
        </div>
    </div>

    <!-- Define Emscripten Module and hook runtime initialization -->
    <script>
        var Module = {
            onRuntimeInitialized: function() {
                console.log("WASM Runtime initialized.");
                const statusDiv = document.getElementById('status');
                statusDiv.innerText = "WebAssembly Loaded Successfully.";
                statusDiv.className = "success";
                document.getElementById('compileBtn').disabled = false;
            }
        };
    </script>
    
    <!-- Load the Emscripten generated JS file -->
    <script src="forml.js"></script>

    <script>
        document.getElementById('compileBtn').addEventListener('click', function() {
            const source = document.getElementById('source').value;
            const diagnosticsOutput = document.getElementById('diagnostics-output');
            const astOutput = document.getElementById('ast-output');

            // Robust check for export function name variations
            const compileFn = Module.compileForml || Module.compile_forml;

            if (!compileFn) {
                diagnosticsOutput.innerHTML = '<span class="error">Error: Compiler function not found in WASM Module.</span>';
                astOutput.innerText = 'N/A';
                return;
            }

            try {
                // Call WASM compilation
                const jsonResultString = compileFn(source);
                
                if (!jsonResultString) {
                    throw new Error("Compiler returned empty response.");
                }

                // Parse response JSON
                const result = JSON.parse(jsonResultString);
                
                // 1. Render AST
                if (result.ast) {
                    astOutput.innerText = JSON.stringify(result.ast, null, 2);
                } else {
                    astOutput.innerText = "null (or not generated due to errors)";
                }

                // 2. Render Diagnostics
                if (result.diagnostics && result.diagnostics.length > 0) {
                    let diagHtml = "";
                    result.diagnostics.forEach(diag => {
                        let sevClass = "info";
                        if (diag.severity === "error") {
                            sevClass = "error";
                        } else if (diag.severity === "warning") {
                            sevClass = "warning";
                        }
                        
                        diagHtml += `<span class="${sevClass}">[${diag.severity.toUpperCase()}] Line ${diag.line}, Col ${diag.col}: ${diag.message}</span>\n`;
                    });
                    diagnosticsOutput.innerHTML = diagHtml;
                } else {
                    diagnosticsOutput.innerHTML = '<span class="success">No diagnostics (compilation clean!)</span>';
                }

            } catch (err) {
                diagnosticsOutput.innerHTML = `<span class="error">Runtime Exception: ${err.message}</span>`;
                astOutput.innerText = 'Failed to parse output JSON.';
            }
        });
    </script>
</body>
</html>
