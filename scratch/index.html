<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emscripten WASM Verification</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #fafafa;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #eaeaea;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        p {
            color: #666666;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }
        .result-box {
            background-color: #f6f8fa;
            border: 1px dashed #d0d7de;
            border-radius: 8px;
            padding: 1.5rem;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            font-size: 1.25rem;
            font-weight: bold;
            color: #0969da;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>WASM Verification</h1>
        <p>Calling the exported C++ function <code>add(2, 3)</code> via Emscripten:</p>
        <div class="result-box" id="output">Loading WASM...</div>
    </div>

    <script>
        var Module = {
            onRuntimeInitialized: function() {
                try {
                    // Call the exported C++ function
                    var result = Module._add(2, 3);
                    document.getElementById('output').textContent = "add(2, 3) = " + result;
                    console.log("C++ add(2, 3) call successful. Result:", result);
                } catch (e) {
                    document.getElementById('output').textContent = "Error: " + e.message;
                    console.error("Failed to call WASM function:", e);
                }
            }
        };
    </script>
    <script src="hello.js"></script>
</body>
</html>
